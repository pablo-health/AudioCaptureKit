name: Soak

# Long-running buffer-reliability soak: drives the real capture graph for
# ~50 minutes of wall-clock real time from both looped file sources
# (CaptureSoakTests) and a deterministic marker-tone generator
# (SignalGeneratorSoakTests), asserting the ring buffer never overflows or
# stalls, channel separation and marker timing hold, pause/resume recovers
# cleanly, and memory stays bounded. Too slow for the PR gate (which runs a
# ~20s version of the same tests), so it runs weekly and on demand.
#
# Both clients ship this capture graph, so both soak. The Windows job is the
# narrower of the two for now — the C# side has no signal-generator/marker
# analog yet — but it covers the same core risk: throughput, stalls, and a
# backlog that grows without bound over a long session.

on:
  schedule:
    # Mondays 08:00 UTC.
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      soak_seconds:
        description: 'Wall-clock capture duration in seconds (default 3000 = 50 min)'
        required: false
        default: '3000'

permissions:
  contents: read

concurrency:
  group: soak-${{ github.ref }}
  cancel-in-progress: false

jobs:
  soak:
    name: Capture soak (buffer reliability, macOS)
    runs-on: macos-15
    # Generous headroom over the 50-min soak for build + start/stop.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Cache SPM dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build --build-tests

      - name: Run soak
        env:
          # schedule has no inputs, so fall back to the 50-minute default.
          SOAK_SECONDS: ${{ github.event.inputs.soak_seconds || '3000' }}
        run: |
          echo "Running capture soak for ${SOAK_SECONDS}s of real-time capture"
          swift test --filter Soak

  csharp-soak:
    name: Capture soak (buffer reliability, Windows)
    runs-on: windows-latest
    # Generous headroom over the 50-min soak for build + start/stop.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build csharp/AudioCapture.Tests/AudioCapture.Tests.csproj -c Release

      - name: Run soak
        env:
          SOAK_SECONDS: ${{ github.event.inputs.soak_seconds || '3000' }}
        run: |
          Write-Output "Running capture soak for $env:SOAK_SECONDS seconds of real-time capture"
          dotnet test csharp/AudioCapture.Tests/AudioCapture.Tests.csproj -c Release --no-build --filter "Category=Soak" --verbosity normal
