name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 3" # Wednesday 8AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      swift: ${{ github.event_name != 'pull_request' || steps.filter.outputs.swift == 'true' }}
      csharp: ${{ github.event_name != 'pull_request' || steps.filter.outputs.csharp == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            swift:
              - 'macOS/**'
              - 'Package.swift'
              - 'Package.resolved'
            csharp:
              - 'csharp/**'

  analyze-swift:
    name: CodeQL (swift)
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache SPM dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          languages: swift
          queries: security-extended

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          category: /language:swift

  analyze-csharp:
    name: CodeQL (csharp)
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: 9.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          languages: csharp
          queries: security-extended

      - name: Build
        run: dotnet build csharp/AudioCapture/AudioCapture.csproj -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          category: /language:csharp
