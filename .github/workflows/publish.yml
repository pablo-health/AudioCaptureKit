name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish-nuget:
    name: Publish NuGet Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack csharp/AudioCapture/AudioCapture.csproj
          -c Release
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -o ./nupkg

      - name: Push to NuGet
        run: >
          dotnet nuget push nupkg\PabloHealth.AudioCaptureKit.${{ steps.version.outputs.version }}.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
