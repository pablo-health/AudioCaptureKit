name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish-nuget:
    name: Publish NuGet Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack csharp/AudioCapture/AudioCapture.csproj
          -c Release
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -o ./nupkg

      - name: Push to NuGet
        run: >
          dotnet nuget push nupkg\PabloHealth.AudioCaptureKit.${{ steps.version.outputs.version }}.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
