name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      swift: ${{ github.event_name == 'push' || steps.filter.outputs.swift }}
      csharp: ${{ github.event_name == 'push' || steps.filter.outputs.csharp }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            swift:
              - 'macOS/**'
              - 'Package.swift'
              - 'Package.resolved'
            csharp:
              - 'csharp/**'
              - 'Examples/windows/**'

  swift-lint:
    name: Swift Lint
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=0.63.2
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o swiftlint.zip
          unzip -q swiftlint.zip -d swiftlint
          echo "$PWD/swiftlint" >> "$GITHUB_PATH"

      - name: Install SwiftFormat
        run: |
          SWIFTFORMAT_VERSION=0.59.1
          curl -sL "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip" -o swiftformat.zip
          unzip -q swiftformat.zip
          chmod +x swiftformat
          echo "$PWD" >> "$GITHUB_PATH"

      - name: SwiftLint
        run: swiftlint lint --strict --config macOS/.swiftlint.yml macOS/Sources/ macOS/Tests/

      - name: SwiftFormat
        run: swiftformat --lint --config macOS/.swiftformat macOS/Sources/ macOS/Tests/

  swift-test:
    name: Swift Build & Test
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache SPM dependencies
        id: spm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Clean stale build artifacts
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: swift package clean

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  csharp-build-test:
    name: C# Build & Test
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore csharp/AudioCapture.Tests/AudioCapture.Tests.csproj

      - name: Build
        run: dotnet build csharp/AudioCapture.Tests/AudioCapture.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test csharp/AudioCapture.Tests/AudioCapture.Tests.csproj -c Release --no-build --verbosity normal

  csharp-format:
    name: C# Format Check
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: 10.0.x

      - name: Check formatting
        run: dotnet format csharp/AudioCapture/AudioCapture.csproj --verify-no-changes --verbosity diagnostic
        env:
          EnableWindowsTargeting: true

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  windows-ci:
    name: Windows CI
    needs: [changes, csharp-build-test, csharp-format]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify Windows CI result
        run: |
          changed="${{ needs.changes.outputs.csharp }}"
          build="${{ needs.csharp-build-test.result }}"
          fmt="${{ needs.csharp-format.result }}"
          echo "csharp changed: $changed"
          echo "csharp-build-test result: $build"
          echo "csharp-format result: $fmt"
          if [ "$changed" = "true" ] && { [ "$build" != "success" ] || [ "$fmt" != "success" ]; }; then
            echo "::error::C# code changed and required jobs did not succeed (build=$build, format=$fmt)"
            exit 1
          fi
          echo "Gate passed"
